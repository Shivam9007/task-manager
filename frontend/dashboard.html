<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --border: #2a2a3a;
      --accent: #7c6aff;
      --accent2: #ff6a9e;
      --accent3: #6affda;
      --text: #f0f0ff;
      --muted: #6b6b8a;
      --danger: #ff4d6a;
      --success: #4dffb0;
      --warning: #ffd166;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── ANIMATED BACKGROUND ── */
    .bg-orbs {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      overflow: hidden;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: float 12s ease-in-out infinite;
    }
    .orb1 { width: 600px; height: 600px; background: var(--accent); top: -200px; left: -200px; animation-delay: 0s; }
    .orb2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -100px; animation-delay: -4s; }
    .orb3 { width: 300px; height: 300px; background: var(--accent3); top: 40%; left: 50%; animation-delay: -8s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    /* ── LAYOUT ── */
    .app { position: relative; z-index: 1; display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      background: rgba(19,19,26,0.8);
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--border);
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 40px;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .logo {
      display: flex; align-items: center; gap: 12px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav { display: flex; flex-direction: column; gap: 6px; }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    .nav-item:hover { color: var(--text); background: var(--surface2); }
    .nav-item.active {
      color: var(--text);
      background: rgba(124,106,255,0.15);
      border-color: rgba(124,106,255,0.3);
    }
    .nav-icon { font-size: 16px; }

    .sidebar-stats {
      margin-top: auto;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
    .mini-bars { display: flex; flex-direction: column; gap: 10px; }
    .mini-bar-row { display: flex; align-items: center; justify-content: space-between; font-size: 12px; }
    .mini-bar-row span:first-child { color: var(--muted); }
    .mini-bar-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; margin: 0 10px; }
    .mini-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }

    .logout-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      background: rgba(255,77,106,0.1);
      border: 1px solid rgba(255,77,106,0.2);
      border-radius: 12px;
      color: var(--danger);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
      width: 100%;
    }
    .logout-btn:hover { background: rgba(255,77,106,0.2); }

    /* ── MAIN ── */
    .main { padding: 40px; display: flex; flex-direction: column; gap: 32px; }

    /* ── HEADER ── */
    .header { display: flex; align-items: flex-start; justify-content: space-between; }
    .header-left h1 {
      font-family: 'Syne', sans-serif;
      font-size: 36px;
      font-weight: 800;
      line-height: 1;
    }
    .header-left p { color: var(--muted); margin-top: 6px; font-size: 14px; }
    .greeting-time {
      font-size: 13px; color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 100px;
    }

    /* ── STATS CARDS ── */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); border-color: var(--accent); }
    .stat-card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 120px; height: 120px;
      border-radius: 50%;
      opacity: 0.08;
    }
    .stat-card:nth-child(1)::before { background: var(--accent); }
    .stat-card:nth-child(2)::before { background: var(--warning); }
    .stat-card:nth-child(3)::before { background: var(--success); }

    .stat-icon { font-size: 24px; margin-bottom: 16px; }
    .stat-number {
      font-family: 'Syne', sans-serif;
      font-size: 40px;
      font-weight: 800;
      line-height: 1;
    }
    .stat-card:nth-child(1) .stat-number { color: var(--accent); }
    .stat-card:nth-child(2) .stat-number { color: var(--warning); }
    .stat-card:nth-child(3) .stat-number { color: var(--success); }
    .stat-desc { color: var(--muted); font-size: 13px; margin-top: 6px; }

    /* ── PROGRESS BAR ── */
    .progress-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
    }
    .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .progress-header h3 { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; }
    .progress-pct { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--accent); }
    .progress-track {
      height: 8px; background: var(--border); border-radius: 4px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 4px;
      transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ── ADD TASK ── */
    .add-task-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
    }
    .add-task-section h3 { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .add-task-form { display: flex; gap: 12px; }
    .task-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .task-input::placeholder { color: var(--muted); }
    .task-input:focus { border-color: var(--accent); }

    .add-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      padding: 14px 24px;
      color: white;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.1s;
    }
    .add-btn:hover { opacity: 0.9; transform: scale(1.02); }
    .add-btn:active { transform: scale(0.98); }

    /* ── TASK LIST ── */
    .tasks-section { display: flex; flex-direction: column; gap: 16px; }
    .tasks-header {
      display: flex; justify-content: space-between; align-items: center;
    }
    .tasks-header h3 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
    .filter-tabs { display: flex; gap: 6px; }
    .filter-tab {
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .filter-tab.active {
      background: rgba(124,106,255,0.15);
      border-color: var(--accent);
      color: var(--accent);
    }

    #taskList { display: flex; flex-direction: column; gap: 10px; list-style: none; }

    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.25s;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .task-item:hover { border-color: var(--accent); transform: translateX(4px); }

    .task-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-pending { background: var(--warning); box-shadow: 0 0 8px var(--warning); }
    .dot-progress { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .dot-completed { background: var(--success); box-shadow: 0 0 8px var(--success); }

    .task-title {
      flex: 1;
      font-size: 15px;
      font-weight: 500;
    }
    .task-title.done { text-decoration: line-through; color: var(--muted); }

    .task-status-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      color: var(--text);
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      outline: none;
    }

    .delete-btn {
      width: 32px; height: 32px;
      background: rgba(255,77,106,0.1);
      border: 1px solid rgba(255,77,106,0.2);
      border-radius: 8px;
      color: var(--danger);
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .delete-btn:hover { background: rgba(255,77,106,0.25); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 15px; }

    /* ── CLOCK ── */
    #clock { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <span class="logo-text">TaskFlow</span>
    </div>

    <nav class="nav">
      <div class="nav-item active"><span class="nav-icon">📋</span> My Tasks</div>
      <div class="nav-item"><span class="nav-icon">📁</span> Projects</div>
      <div class="nav-item"><span class="nav-icon">📊</span> Analytics</div>
      <div class="nav-item"><span class="nav-icon">🗓</span> Calendar</div>
      <div class="nav-item"><span class="nav-icon">⚙️</span> Settings</div>
    </nav>

    <div class="sidebar-stats">
      <div class="stat-label">Quick Stats</div>
      <div class="mini-bars">
        <div class="mini-bar-row">
          <span>Pending</span>
          <div class="mini-bar-track"><div class="mini-bar-fill" id="sb-pending" style="background:var(--warning);width:0%"></div></div>
          <span id="sb-pending-n">0</span>
        </div>
        <div class="mini-bar-row">
          <span>In Progress</span>
          <div class="mini-bar-track"><div class="mini-bar-fill" id="sb-progress" style="background:var(--accent);width:0%"></div></div>
          <span id="sb-progress-n">0</span>
        </div>
        <div class="mini-bar-row">
          <span>Done</span>
          <div class="mini-bar-track"><div class="mini-bar-fill" id="sb-done" style="background:var(--success);width:0%"></div></div>
          <span id="sb-done-n">0</span>
        </div>
      </div>
    </div>

    <button class="logout-btn" onclick="logoutUser()">🚪 Sign Out</button>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- HEADER -->
    <div class="header">
      <div class="header-left">
        <h1>Good <span id="timeOfDay">Day</span> 👋</h1>
        <p>Here's what's on your plate today.</p>
      </div>
      <div class="greeting-time" id="clock">--:-- --</div>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-icon">📝</div>
        <div class="stat-number" id="stat-total">0</div>
        <div class="stat-desc">Total Tasks</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⏳</div>
        <div class="stat-number" id="stat-pending">0</div>
        <div class="stat-desc">In Progress</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">✅</div>
        <div class="stat-number" id="stat-done">0</div>
        <div class="stat-desc">Completed</div>
      </div>
    </div>

    <!-- PROGRESS -->
    <div class="progress-section">
      <div class="progress-header">
        <h3>Overall Progress</h3>
        <span class="progress-pct" id="progress-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <!-- ADD TASK -->
    <div class="add-task-section">
      <h3>✨ Add New Task</h3>
      <div class="add-task-form">
        <input class="task-input" type="text" id="taskTitle" placeholder="What needs to be done?" />
        <button class="add-btn" onclick="addTask()">+ Add Task</button>
      </div>
    </div>

    <!-- TASK LIST -->
    <div class="tasks-section">
      <div class="tasks-header">
        <h3>All Tasks</h3>
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
          <button class="filter-tab" onclick="setFilter('Pending', this)">Pending</button>
          <button class="filter-tab" onclick="setFilter('In Progress', this)">In Progress</button>
          <button class="filter-tab" onclick="setFilter('Completed', this)">Done</button>
        </div>
      </div>
      <ul id="taskList"></ul>
    </div>

  </main>
</div>

<script src="script.js"></script>
<script>
  // Clock
  function updateClock() {
    const now = new Date();
    let h = now.getHours(), m = now.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    document.getElementById('clock').textContent = `${h}:${String(m).padStart(2,'0')} ${ampm}`;
    const tod = now.getHours();
    document.getElementById('timeOfDay').textContent =
      tod < 12 ? 'Morning' : tod < 17 ? 'Afternoon' : 'Evening';
  }
  updateClock();
  setInterval(updateClock, 1000);

  // Filter state
  let currentFilter = 'all';
  let allTasks = [];

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTasks(allTasks);
  }

  // Override loadTasks to capture data and render beautifully
  const _origLoad = window.loadTasks;
  window.loadTasks = async function() {
    try {
      const res = await fetch(`${API}/tasks`, { headers: getHeaders() });
      allTasks = await res.json();
      renderTasks(allTasks);
      updateStats(allTasks);
    } catch(e) { console.error(e); }
  };

  function renderTasks(tasks) {
    const list = document.getElementById('taskList');
    const filtered = currentFilter === 'all' ? tasks : tasks.filter(t => t.status === currentFilter);

    if (!filtered.length) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">🎉</div><p>${currentFilter === 'Completed' ? 'No completed tasks yet.' : 'No tasks here. Add one above!'}</p></div>`;
      return;
    }

    list.innerHTML = '';
    filtered.forEach(task => {
      const li = document.createElement('li');
      li.className = 'task-item';
      const dotClass = task.status === 'Completed' ? 'dot-completed' : task.status === 'In Progress' ? 'dot-progress' : 'dot-pending';
      const titleClass = task.status === 'Completed' ? 'done' : '';
      li.innerHTML = `
        <div class="task-dot ${dotClass}"></div>
        <span class="task-title ${titleClass}">${task.title}</span>
        <select class="task-status-select" onchange="updateTask('${task._id}', this.value)">
          <option value="Pending" ${task.status==='Pending'?'selected':''}>⏳ Pending</option>
          <option value="In Progress" ${task.status==='In Progress'?'selected':''}>🔥 In Progress</option>
          <option value="Completed" ${task.status==='Completed'?'selected':''}>✅ Done</option>
        </select>
        <button class="delete-btn" onclick="deleteTask('${task._id}')">🗑</button>
      `;
      list.appendChild(li);
    });
  }

  function updateStats(tasks) {
    const total = tasks.length;
    const done = tasks.filter(t => t.status === 'Completed').length;
    const progress = tasks.filter(t => t.status === 'In Progress').length;
    const pending = tasks.filter(t => t.status === 'Pending').length;
    const pct = total ? Math.round((done / total) * 100) : 0;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-pending').textContent = progress;
    document.getElementById('stat-done').textContent = done;
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';

    // Sidebar bars
    const max = Math.max(total, 1);
    document.getElementById('sb-pending').style.width = (pending/max*100)+'%';
    document.getElementById('sb-progress').style.width = (progress/max*100)+'%';
    document.getElementById('sb-done').style.width = (done/max*100)+'%';
    document.getElementById('sb-pending-n').textContent = pending;
    document.getElementById('sb-progress-n').textContent = progress;
    document.getElementById('sb-done-n').textContent = done;
  }

  // Enter key to add task
  document.getElementById('taskTitle').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  // Load tasks on start
  loadTasks();
</script>
</body>
</html>
